name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Akwab-Api
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, redis, gd
          coverage: none
      - name: Create .env
        run: |
          cat > .env << 'EOF'
          APP_NAME=Laravel
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=laravel_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          EOF
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Generate app key
        run: php artisan key:generate
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent && break
            sleep 2
          done
      - name: Run migrations
        run: php artisan migrate --force
      - name: Run tests
        run: php artisan test

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Composer audit (backend)
        working-directory: Akwab-Api
        run: composer install --no-interaction --prefer-dist --no-scripts --quiet && composer audit --format=table
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit (frontend)
        working-directory: Akwab-Front
        run: npm install --no-audit --quiet && npm audit --audit-level=high
        continue-on-error: true

      - name: Build api image (for scan)
        run: docker build -f Akwab-Api/dockerfile.prod -t akwab-api-scan:latest ./Akwab-Api

      - name: Build front image (for scan)
        run: |
          docker build \
            -f Akwab-Front/dockerfile.prod \
            --build-arg VITE_API_URL=https://placeholder-check.local \
            -t akwab-front-scan:latest ./Akwab-Front

      - name: Trivy scan - backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: akwab-api-scan:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Trivy scan - frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: akwab-front-scan:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f Akwab-Api/dockerfile.prod -t akwab-api-check:latest ./Akwab-Api
      - name: Build front image
        run: |
          docker build \
            -f Akwab-Front/dockerfile.prod \
            --build-arg VITE_API_URL=https://placeholder-check.local \
            -t akwab-front-check:latest ./Akwab-Front

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-build-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Link Railway project
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway link --project f3bfe511-b329-4982-b664-570e73484ec2 --environment production
      - name: Deploy api
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --service akwab-event-audit-Back
      - name: Deploy front
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --service akwab-event-audit-Front